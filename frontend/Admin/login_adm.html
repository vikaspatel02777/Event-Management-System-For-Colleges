<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>body {
  margin: 0;
  background: #eef2f3;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

.login-box {
  background: white;
  padding: 35px;
  width: 350px;
  border-radius: 12px;
  box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
}

.login-box h2 {
  margin: 0 0 20px 0;
  text-align: center;
}

.login-box label {
  font-size: 14px;
  font-weight: bold;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 8px 0 18px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 10px;
  background: #1e1f23;
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #333;
}
</style>
</head>
<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <form>
    <label>Admin ID.</label>
    <input id="enroll" type="text" placeholder="Enter ID">

    <label>Password</label>
    <input id="password" type="password" placeholder="Enter Password">


    <button type="button" onclick="Login()">Login</button>
  </form>
</div>

</body>

<script>
    async function Login(){

        const Enroll = document.getElementById("enroll").value;
        const password = document.getElementById("password").value;
        
        if(!Enroll || !password){
          alert("enter all detaile");
          return
        }

    if(Enroll == 219 && password == 8120){
     console.log("finaly login : " + Enroll);
     window.location.href = "adm_dashboard.html"; 
    }
    else{
      console.log("data not matched");
      alert("!User not found \nCorret 'id' or 'pasword'");
  }
}
</script>
</html>
