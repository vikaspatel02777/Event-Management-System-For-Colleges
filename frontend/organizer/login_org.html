<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizer Login</title>
  <style>body {
  margin: 0;
  background: #eef2f3;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

.login-box {
  background: white;
  padding: 35px;
  width: 350px;
  border-radius: 12px;
  box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
}

.login-box h2 {
  margin: 0 0 20px 0;
  text-align: center;
}

.login-box label {
  font-size: 14px;
  font-weight: bold;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 8px 0 18px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 10px;
  background: #1e1f23;
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #333;
}
</style>
</head>
<body>

<div class="login-box">
  <h2>Organizer Login</h2>

  <form>
    <label>Org_ID No.</label>
    <input id="org_id" type="text" placeholder="Enter ID" autocomplete="off">

    <label>Password</label>
    <input id="password" type="password" placeholder="Enter Password" autocomplete="off">

    <label onclick="window.location.href='Org_register.html'"><div style="color:blue">New User</div></label><br>

    <button type="button" onclick="Login()">Login</button>
  </form>
</div>

</body>

<script>
    async function Login(){

        const org_idinput = document.getElementById("org_id");
        const passwordinput = document.getElementById("password");
          
        const org_id = org_idinput.value;
        const password = passwordinput.value;

        if(!org_id || !password){
          alert("enter all detaile");
          return
        }
      const baseURL =  "http://localhost:5500/api/orgaccount/login";
      const newOrganizer = {org_id , password};

  try{
      const login = await fetch(baseURL , {
       method : "POST",
       headers :{ "Content-Type": "application/json" },
       body : JSON.stringify(newOrganizer)
    });

    if(login.ok){
     const result = await login.json();
     localStorage.setItem("userdata", JSON.stringify(result.user));
     window.location.href = "org_dashboard_2.html"; 
     
    }
    else{
      console.log("data not matched");
      alert("!User not found \nCorret 'id' or 'pasword'");
    }
  }
  catch(err){
    console.log("error : " + err);
  }

}
</script>
</html>
