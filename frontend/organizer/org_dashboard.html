<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Student Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            padding: 20px;
        }

        /* Header */
        .header {
            background: #0b63d6;
            color: white;
            padding: 18px;
            text-align: center;
        }

        /* Card */
        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        .card h2 {
            margin: 0 0 10px 0;
            font-size: 20px;
            color: #0b63d6;
        }

        /* ---------- NEW SHORT CSS FOR TWO SIDE CARDS ---------- */
        .button-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }

        .action-card {
            background: #0b63d6;
            color: white;
            padding: 25px;
            width: 250px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
            font-size: 18px;
        }

        .action-card:hover {
            background: #094fa8;
            transform: translateY(-3px);
        }

        /* ------------------------------------------------------- */


        /* Form initially hidden */
        #createEventForm {
            display: none;
            margin: 20px auto;
            max-width: 600px;
            padding: 20px;
            background: #f0f8ff;
            border-radius: 10px;
        }

        #createEventForm input,
        #createEventForm textarea {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-bottom: 12px;
        }

        #createEventForm button {
            background-color: #00b894;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #ccc;
        }

        .edit-btn {
            background: #1976d2;
            color: white;
        }

        .delete-btn {
            background: #d32f2f;
            color: white;
        }

        .view-btn {
            background: #00b894;
            color: white;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <h1 id="wel">Welcome</h1>
        <p>On Your College Event Management Dashboard</p>
    </div>

    <!-- Profile -->
    <div class="card">
        <h2>Organizer Profile</h2>
        <p>Org Name: <span id="name"></span></p>
        <p>Role: <span id="role"></span></p>
        <p>Contact: <span id="phone"></span></p>
        <p>Email: <span id="email"></span></p>
    </div>

    <!-- *********** NEW TWO BUTTON CARDS *********** -->
    <div class="button-row">
        <div class="action-card" onclick="toggleForm()">➕ Create New Single Event</div>
        <div class="action-card" onclick="window.location.href='multi_event.html'">Multi Level Event</div>
    </div>

    <!-- Create Event Form -->
    <section id="createEventForm">
        <h2>Create / Add New Event</h2>
        <form id="eventForm">
            <label>Event Name:</label>
            <input id="event_name" type="text" required>

            <label>Date :</label>
            <input id="event_date" type="date" required>

            <label>Time :</label>
            <input id="event_time" type="time" required>

            <label>Location:</label>
            <input id="event_location" type="text" required>

            <label>Maximum Seats:</label>
            <input id="event_seats" type="number" required>

            <label>Description:</label>
            <textarea id="event_discription" rows="4" required></textarea>

            <label>Upload Image:</label>
            <input id="event_file" type="file">

            <button type="button" onclick="event_creat()">Create Event</button>
        </form>
    </section>

</body>

<script>

    function toggleForm() {
        const form = document.getElementById("createEventForm");
        if (form.style.display === "block") {
            form.style.display = "none";   // agar block hai → hide
        } else {
            form.style.display = "block";  // agar block nahi hai → show
        }
    }

    const data = JSON.parse(localStorage.getItem("userdata"));
    document.getElementById("wel").innerText = "Welcome " + data.name;
    document.getElementById("name").innerText = data.name;
    document.getElementById("role").innerText = data.role;
    document.getElementById("phone").innerText = data.phone;
    document.getElementById("email").innerText = data.email;

    async function event_creat() {
        const event_name = document.getElementById("event_name").value;
        const event_date = document.getElementById("event_date").value;
        const event_time = document.getElementById("event_time").value;
        const event_location = document.getElementById("event_location").value;
        const event_seats = document.getElementById("event_seats").value;
        const event_discription = document.getElementById("event_discription").value;

        const baseURL = "http://localhost:5500/api/event";
        const newEvent = { event_name, event_date, event_time, event_location, event_seats, event_discription };

        try {
            const response = await fetch(baseURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(newEvent)
            });

            if (response.ok) {
                alert("Event Created — Ready for Approval");
            }
            else if (response.status == 400) {
                alert("event alrady exists!")
            }
            else {
                alert("API ERROR");
            }
        } catch (err) {
            console.log("Network Error");
        }
    }
</script>

</html>
