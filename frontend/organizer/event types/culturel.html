<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 20px;
            background-image: url("demo_img/culturel_back.jpeg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .card h2 {
            color: #0b63d6;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin: 10px 0 5px 0;
            font-weight: bold;
        }

        input,
        textarea,
        select,
        button {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
        }

        button {
            background: #0b63d6;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #094fa8;
        }
    </style>
</head>

<body>


    <div class="card">
        <h2>Event Details</h2>

        <label for="eventName">Event Name:</label>
        <input type="text" id="eventName" placeholder="Enter Event Name">

        <label for="eventtype">Type:</label>
        <input type="text" id="eventtype" placeholder="Enter Event Type">

        <label for="eventDate">Date:</label>
        <input type="date" id="eventDate">

        <label for="eventTime">Time:</label>
        <input type="time" id="eventTime">

        <label for="eventLocation">Location:</label>
        <input type="text" id="eventLocation" placeholder="Enter Location">

        <label for="eventSeats">Number of Participants / Seats:</label>
        <input type="number" id="eventSeats" placeholder="Enter number of seats">

        <label for="eventDesc">Description:</label>
        <textarea id="eventDesc" rows="4" placeholder="Enter event description">

    </textarea>

        <label for="eventFile">Attach File(optional):</label>
        <input type="file" id="eventFile">

        <button type="submit" onclick="culturel_event()">Create Event</button>
    </div>

    <script>

        async function culturel_event() {
            const name = document.getElementById("eventName").value;
            const type = document.getElementById("eventtype").value;
            const date = document.getElementById("eventDate").value;
            const time = document.getElementById("eventTime").value;
            const location = document.getElementById("eventLocation").value;
            const seats = document.getElementById("eventSeats").value;
            const desc = document.getElementById("eventDesc").value;

            if (!name || !type || !date || !time || !location || !seats || !desc) {
                alert("Please fill all required fields!");
                return;
            }

            const baseURL = "http://localhost:5500/api/culturel_event";
            const newEvent = { name, type, date, time, location, seats, desc };
            try {
                const response = await fetch(baseURL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(newEvent)
                });

                if (response.ok) {
                    alert("Event Created — Ready for Approval");
                }
                else if (response.status == 400) {
                    alert("!! event alrady exists !")
                }
                else {
                    alert("API ERROR");
                }
            } catch (err) {
                console.log("Network Error");
            }

        } 
    </script>

</body>

</html>
